name: CLA 📝

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

jobs:
  cla:
    uses: omnidotdev/.github/.github/workflows/cla.yml@master
    permissions:
      actions: read
      contents: write
      pull-requests: write
      statuses: write
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
